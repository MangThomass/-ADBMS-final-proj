{% extends "base.html" %}
{% block content %}

<h2>Track Your Order</h2>

<form action="/track_order" method="POST">
    <input type="number" name="order_id" placeholder="Order ID">
    <button type="submit">Check</button>
</form>

{% if order %}
<p>Status: {{ order.status }}</p>

<ul>
{% for item in items %}
    <li>{{ item.name }} x{{ item.quantity }}</li>
{% endfor %}
</ul>
{% endif %}
{% endblock %}
