{% extends "base.html" %}
{% block content %}

<style>
    .admin-container { max-width: 1000px; margin: 40px auto; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
    .admin-header { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    /* Form Styling */
    .add-form-card { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 30px; display: flex; gap: 15px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .add-form-card input, .add-form-card select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; flex: 1; outline: none; }
    .add-form-card input:focus, .add-form-card select:focus { border-color: #4CAF50; }
    .btn-add { background: #4CAF50; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; white-space: nowrap; }
    .btn-add:hover { background: #45a049; }
    
    /* Table Styling */
    .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .admin-table th, .admin-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
    .admin-table th { background: #eaf5eb; color: #333; font-weight: bold; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
    .admin-table tr:hover { background: #fdfdfd; }
    
    .btn-delete { color: white; background: #dc3545; padding: 8px 12px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; transition: 0.2s; }
    .btn-delete:hover { background: #c82333; }
</style>

<div class="admin-container">
    <h2 class="admin-header">🛠️ Admin Menu Management</h2>

    <form method="POST" class="add-form-card">
        <input type="text" name="name" placeholder="Item Name" required>
        <input type="number" step="0.01" name="price" placeholder="Price (e.g. 150.00)" required>
        
        <select name="category" required>
            <option value="" disabled selected>Select Category...</option>
            {% for c in categories %}
            <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
        </select>

        <button type="submit" class="btn-add">+ Add Item</button>
    </form>

    <table class="admin-table">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Action</th>
        </tr>

        {% for item in items %}
        <tr>
            <td><strong>{{ item.name }}</strong></td>
            <td>₱{{ "%.2f"|format(item.price) }}</td>
            <td>{{ item.category_name }}</td> 
            <td>
                <a href="/delete/{{ item.id }}" class="btn-delete" onclick="return confirm('Are you sure you want to delete {{ item.name }}?');">Delete</a>
            </td>
        </tr>
        {% endfor %}
        
    </table>
</div>

{% endblock %}
