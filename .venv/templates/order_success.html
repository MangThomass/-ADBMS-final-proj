{% extends "base.html" %}
{% block content %}
<style>
    .success-container { text-align: center; margin: 50px auto; padding: 40px; background: #eaf5eb; border-radius: 12px; max-width: 500px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .success-icon { font-size: 60px; margin-bottom: 20px; }
    .order-id-display { font-size: 28px; font-weight: bold; color: #4CAF50; margin: 15px 0; background: #fff; padding: 15px; border-radius: 8px; border: 2px dashed #4CAF50; }
    .btn-track { display: inline-block; padding: 12px 25px; background: #4CAF50; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; transition: 0.3s; }
    .btn-track:hover { background: #45a049; }
</style>

<div class="success-container">
    <div class="success-icon">🎉</div>
    <h2>Order Submitted Successfully!</h2>
    <p>Thank you for ordering. Your Order ID is:</p>
    
    <div class="order-id-display">#{{ order_id }}</div>
    
    <p>Please keep this ID to check on your food's status.</p>
    <a href="/track" class="btn-track">Track My Order</a>
</div>
{% endblock %}
